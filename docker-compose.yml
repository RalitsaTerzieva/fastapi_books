version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
    command: uvicorn books:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data

volumes:
  redis-data: